services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: notsajeed/repo-visualizer-backend:latest
    container_name: repo-backend
    ports:
      - "5000:5000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: notsajeed/repo-visualizer-frontend:latest
    container_name: repo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped